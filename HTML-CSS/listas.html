<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <h2>Listas</h2>
    <p>Lista ordenada ol</p>
    <ol type="1">
        <li>Ferver água</li>
        <li>Colocar óleo na panela</li>
        <li>Dourar o alho</li>
        <li>Fritar o arroz</li>
        <li>Colocar a aguá fervendo e sal</li>
    </ol>

    <p>Lista desordenada ul</p>
    <ul type="square">
        <li>Comprar arroz</li>
        <li>Comprar óleo</li>
        <li>Comprar temperos
            <ul type="circle">
                <li>alho</li>
                <li>sal</li>
                <li>cheiro verde</li>
            </ul>
        </li>
    </ul>
</body>
</html>
